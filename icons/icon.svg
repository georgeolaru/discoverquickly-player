<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Discover Quickly Queue Player icon</title>
  <desc id="desc">A simplified Discover Quickly-inspired circular badge with a warm orb and violet echo.</desc>
  <defs>
    <radialGradient id="badge" cx="40%" cy="30%" r="75%">
      <stop offset="0" stop-color="#575173"/>
      <stop offset="1" stop-color="#312c48"/>
    </radialGradient>
    <radialGradient id="orb" cx="38%" cy="28%" r="72%">
      <stop offset="0" stop-color="#ffe68f"/>
      <stop offset="0.46" stop-color="#ffbe63"/>
      <stop offset="1" stop-color="#ff5f8a"/>
    </radialGradient>
    <linearGradient id="echo" x1="49" y1="55" x2="82" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffa0e5"/>
      <stop offset="1" stop-color="#875bff"/>
    </linearGradient>
    <clipPath id="badgeClip">
      <circle cx="64" cy="64" r="46"/>
    </clipPath>
  </defs>

  <circle cx="64" cy="64" r="46" fill="url(#badge)"/>
  <circle cx="64" cy="64" r="45" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <g clip-path="url(#badgeClip)">
    <circle cx="52" cy="52" r="23" fill="url(#orb)"/>
    <circle cx="76" cy="74" r="15" fill="url(#echo)"/>
    <path
      d="M36 45c7-9 19-13 30-11 9 2 17 7 22 16-6-4-11-6-18-7-10-1-20 2-30 10-3 2-5 4-7 6 0-5 1-10 3-14z"
      fill="#fff"
      opacity="0.18"
    />
    <circle cx="46" cy="44" r="8" fill="#fff" opacity="0.12"/>
    <circle cx="76" cy="74" r="3.5" fill="#fff" opacity="0.2"/>
  </g>
</svg>
